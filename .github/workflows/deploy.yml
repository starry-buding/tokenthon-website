name: Deploy to Tencent Lighthouse
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: deploy-production
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          debug: true
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            set -x
            echo "[deploy] connected to server"
            echo "[deploy] user=$(whoami) host=$(hostname)"
            echo "[deploy] path=${{ secrets.DEPLOY_PATH }}"
            # Avoid nvm auto-use issues caused by user-level npmrc prefix/globalconfig.
            command -v node
            command -v npm
            node -v
            npm -v

            cd "${{ secrets.DEPLOY_PATH }}"
            pwd
            ls -la
            git fetch origin main
            git reset --hard origin/main
            # Prefer reproducible install. Fall back if lockfile is missing.
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
              export PATH="$(npm config get prefix)/bin:$PATH"
            fi
            PM2_BIN="$(command -v pm2 || true)"
            if [ -z "$PM2_BIN" ]; then
              PM2_BIN="$(npm config get prefix)/bin/pm2"
            fi
            "$PM2_BIN" -v
            "$PM2_BIN" restart tokenthon-website || "$PM2_BIN" start npm --name tokenthon-website -- start
            "$PM2_BIN" save
